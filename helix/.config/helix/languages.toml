# ============================================================================
# Go — Primary language
# ============================================================================
[[language]]
name = "go"
auto-format = true
formatter = { command = "goimports" }
language-servers = ["gopls"]

[language-server.gopls]
command = "gopls"

[language-server.gopls.config]
gofumpt = true
staticcheck = true

[language-server.gopls.config.analyses]
unusedparams = true
shadow = true
nilness = true
unusedwrite = true
useany = true
unusedvariable = true

[language-server.gopls.config.hints]
assignVariableTypes = false
compositeLiteralFields = false
compositeLiteralTypes = false
constantValues = true
functionTypeParameters = false
parameterNames = true
rangeVariableTypes = false

# ============================================================================
# Go templates (HTML templates in Go projects)
# ============================================================================
[[language]]
name = "gotmpl"
auto-format = true
language-servers = ["gopls"]

# ============================================================================
# Go mod files
# ============================================================================
[[language]]
name = "gomod"
auto-format = true
language-servers = ["gopls"]

# ============================================================================
# Markdown
# ============================================================================
[[language]]
name = "markdown"
soft-wrap.enable = true

# ============================================================================
# TOML (for config files)
# ============================================================================
[[language]]
name = "toml"
auto-format = true

# ============================================================================
# JSON
# ============================================================================
[[language]]
name = "json"
auto-format = true

# ============================================================================
# YAML
# ============================================================================
[[language]]
name = "yaml"
auto-format = true

# ============================================================================
# Bash/Shell
# ============================================================================
[[language]]
name = "bash"
auto-format = false

# ============================================================================
# Dockerfile
# ============================================================================
[[language]]
name = "dockerfile"
auto-format = false

# ============================================================================
# Python
# ============================================================================
[[language]]
name = "python"
auto-format = true
formatter = { command = "black", args = ["-", "--quiet"] }
language-servers = ["pyright", "ruff"]

[language.debugger]
name = "debugpy"
transport = "stdio"
command = "python3"
args = ["-m", "debugpy.adapter"]

[[language.debugger.templates]]
name = "source"
request = "launch"
completion = [{ name = "entrypoint", completion = "filename", default = "." }]
args = { mode = "debug", program = "{0}" }

[[language.debugger.templates]]
name = "attach"
request = "attach"
completion = ["pid"]
args = { processId = "{0}" }

[language-server.pyright]
command = "pyright-langserver"
args = ["--stdio"]

[language-server.pyright.config.python.analysis]
typeCheckingMode = "basic"
autoSearchPaths = true
useLibraryCodeForTypes = true

[language-server.ruff]
command = "ruff"
args = ["server", "--preview"]

# ============================================================================
# Rust
# ============================================================================
[[language]]
name = "rust"
auto-format = true
formatter = { command = "rustfmt" }
language-servers = ["rust-analyzer"]

[language.debugger]
name = "lldb-dap"
transport = "stdio"
command = "lldb-dap"

[[language.debugger.templates]]
name = "binary"
request = "launch"
completion = [{ name = "binary", completion = "filename" }]
args = { program = "{0}" }

[[language.debugger.templates]]
name = "binary (terminal)"
request = "launch"
completion = [{ name = "binary", completion = "filename" }]
args = { program = "{0}", runInTerminal = true }

[[language.debugger.templates]]
name = "attach"
request = "attach"
completion = ["pid"]
args = { pid = "{0}" }

[language-server.rust-analyzer]
command = "rust-analyzer"

[language-server.rust-analyzer.config.check]
command = "clippy"

# ============================================================================
# TypeScript / JavaScript (if you ever use it)
# ============================================================================
[[language]]
name = "typescript"
auto-format = true

[[language]]
name = "javascript"
auto-format = true
